<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>전자랜드 판촉 조회</title>
<style>
:root{--ink:#1b2a1b;--bg:#F1ECE2;--panel:#fff;--green:#2A4A2A;--accent:#C9743F;--line:#e1dac9;--red:#c0392b;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:32px 28px;max-width:360px;width:100%;text-align:center;
  box-shadow:0 4px 24px rgba(0,0,0,.08)}
.logo{font-size:36px;margin-bottom:8px}
h1{font-size:18px;font-weight:800;color:var(--green);margin:0 0 4px}
.sub{font-size:12px;color:#999;margin-bottom:28px}
.pw-wrap{display:flex;gap:8px;margin-bottom:10px}
input[type=password]{flex:1;font-family:inherit;font-size:15px;padding:12px 14px;
  border:1.5px solid var(--line);border-radius:9px;outline:none;background:#fff}
input[type=password]:focus{border-color:var(--accent)}
.login-btn{font-family:inherit;font-size:15px;font-weight:700;padding:12px 20px;
  border-radius:9px;border:none;background:var(--green);color:#fff;cursor:pointer;white-space:nowrap}
.login-btn:active{background:#1a3a1a}
.err{font-size:12.5px;color:var(--red);min-height:18px;margin-bottom:20px;text-align:left}
.links{display:none;flex-direction:column;gap:10px}
.link-btn{display:block;padding:14px;border-radius:10px;font-size:15px;font-weight:700;
  text-decoration:none;text-align:center;transition:.15s}
.link-btn.viewer{background:var(--green);color:#fff}
.link-btn.admin{background:#C40C22;color:#fff;font-size:13px;padding:11px}
.link-btn:active{opacity:.85}
.divider{font-size:11px;color:#bbb;margin:2px 0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">&#9889;</div>
  <h1>전자랜드 판촉 통합 조회</h1>
  <div class="sub">LG &#183; Samsung &#183; 기준일 2026.06.03</div>

  <div id="login-area">
    <div class="pw-wrap">
      <input type="password" id="pw" placeholder="비밀번호 입력"
        onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()">확인</button>
    </div>
    <div class="err" id="err"></div>
  </div>

  <div class="links" id="links">
    <a class="link-btn viewer" href="viewer.html">&#128269; 지점별 조회 (PC &#183; 모바일)</a>
    <div class="divider">&#8212;&#8212; 관리자 전용 &#8212;&#8212;</div>
    <a class="link-btn admin" href="admin.html">&#128273; 관리자 — 전 지점 통합 (LG+SS)</a>
  </div>
</div>

<script>
var PW_HASH = 'c47bfdf682c7339e13705a11f4fcb6008f21fa52f97c48fc7182d4e7b30d5f07';
function sha256(str){
  var buf = new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256', buf).then(function(hash){
    return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  });
}
function doLogin(){
  var pw = document.getElementById('pw').value;
  if(!pw){document.getElementById('err').textContent='비밀번호를 입력해 주세요';return;}
  sha256(pw).then(function(hash){
    if(hash===PW_HASH){
      document.getElementById('login-area').style.display='none';
      document.getElementById('links').style.display='flex';
      document.getElementById('err').textContent='';
      sessionStorage.setItem('auth','1');
    }else{
      document.getElementById('err').textContent='비밀번호가 맞지 않습니다';
      document.getElementById('pw').value='';
      document.getElementById('pw').focus();
    }
  });
}
if(sessionStorage.getItem('auth')==='1'){
  document.getElementById('login-area').style.display='none';
  document.getElementById('links').style.display='flex';
}
document.getElementById('pw').focus();
</script>
</body>
</html>
